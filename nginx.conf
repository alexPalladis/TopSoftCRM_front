# ============================================================
# nginx.conf — Frontend container
#
# Responsibilities:
#  1. Serve Vite/React static files
#  2. SPA fallback (all routes → index.html for React Router)
#  3. Security headers
#  4. Static asset caching (JS/CSS are fingerprinted by Vite)
#  5. Gzip compression
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/woff2;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Static assets (Vite fingerprints filenames — safe to cache forever) ──
    location ~* \.(js|css|woff2?|ttf|ico|png|svg|jpg|jpeg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check endpoint (used by Docker HEALTHCHECK) ───
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback — ALL routes serve index.html ───────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}